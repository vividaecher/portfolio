<!doctype html>
<html lang="de">
<head>
  <meta name="robots" content="noindex">
  <title data-i18n-meta="meta_title_404"></title>
  <meta name="language" content="de, en">
  <link rel="canonical" href="https://virginia.uber.space/404.html">
  <meta charset="UTF-8">
  <meta name="author" content="Virginia Dächer">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,shrink-to-fit=no">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body class="text-white bg-[var(--space-black)] bg-[url(/img/Sterne.svg)] bg-no-repeat bg-top">
<!-- MOBILE NAV -->
<nav id="mobileNav" class="mobile-nav">
  <div class="container-main h-full flex flex-col section">
    <div class="flex justify-between items-center mb-[1rem]">
      <a data-i18n-href="homescreen_link" data-i18n-aria="homescreen_aria" data-i18n-title="homescreen_title">
        <img src="/img/logo_virginia_daecher.svg" data-i18n-alt="logo_alt" class="h-[32px]">
      </a>
      <button id="closeMenu" class="text-4xl text-white">
        <span class="material-symbols-outlined !text-[2rem]">close</span>
      </button>
    </div>
    <div class="h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
      <ul class="flex flex-col text-xl mt-12">
        <li class="nav-item">
          <a class="mobile-link" data-i18n-href="homescreen_link" data-i18n-aria="homescreen_aria" data-i18n-title="homescreen_title">
            <span class="material-symbols-outlined text-[var(--neon-blue)]">arrow_forward</span>
            <span data-i18n="nav_launchpad"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="mobile-link" data-i18n-href="ueber_mich_link" data-i18n-aria="ueber_mich_aria" data-i18n-title="ueber_mich_title">
            <span class="material-symbols-outlined text-[var(--neon-blue)]">arrow_forward</span>
            <span data-i18n="nav_crew_profile"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="mobile-link" data-i18n-href="portfolio_link" data-i18n-aria="portfolio_aria" data-i18n-title="portfolio_title">
            <span class="material-symbols-outlined text-[var(--neon-blue)]">arrow_forward</span>
            <span data-i18n="nav_missions"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="mobile-link" data-i18n-href="imprint_link" data-i18n-aria="imprint_aria">
            <span class="material-symbols-outlined text-[var(--neon-blue)]">arrow_forward</span>
            <span data-i18n="nav_imprint"></span>
          </a>
        </li>
      </ul>
  </div>
</nav>
<main>
<section class="section-inner">
  <div class="container-main">
    <nav class="hidden lg:block" data-i18n-aria="nav_main_aria">
      <div class="px-6">
        <!-- 12-Spalten-Grid: 5 | 2 (Logo) | 5 -->
        <div class="grid grid-cols-12 items-center py-4">
          <div class="col-span-5 flex items-center">
            <a class="nav-link shrink-0 text-base font-medium" data-i18n-href="homescreen_link" data-i18n-aria="homescreen_aria" data-i18n-title="homescreen_title">
              <span data-i18n="nav_launchpad"></span>
            </a>
            <a class="nav-link mx-auto text-base font-medium" data-i18n-href="ueber_mich_link" data-i18n-aria="ueber_mich_aria" data-i18n-title="ueber_mich_title">
              <span data-i18n="nav_crew_profile"></span>
            </a>
          </div>
          <a class="col-span-2 justify-self-center" data-i18n-href="homescreen_link" data-i18n-aria="homescreen_aria" data-i18n-title="homescreen_title">
            <img src="/img/logo_virginia_daecher.svg" data-i18n-alt="logo_alt" class="hidden lg:block" />
          </a>
          <div class="col-span-5 flex items-center">
            <a class="nav-link mx-auto text-base font-medium" data-i18n-href="portfolio_link" data-i18n-aria="portfolio_aria" data-i18n-title="portfolio_title">
              <span data-i18n="nav_missions"></span>
            </a>
            <a class="nav-link shrink-0 text-base font-medium" data-i18n-href="imprint_link" data-i18n-aria="imprint_aria">
              <span data-i18n="nav_imprint"></span>
            </a>
          </div>
        </div>
      </div>
    </nav>
    <!-- Mobile Menu Button -->
    <div class="lg:hidden flex justify-between items-center mb-[1rem]">
       <!-- Logo immer horizontal zentriert -->
      <a href="#" class="justify-self-center" data-i18n-href="homescreen_link" data-i18n-aria="homescreen_aria" data-i18n-title="homescreen_title">
        <img src="/img/logo_virginia_daecher.svg" data-i18n-alt="logo_alt" class="h-[32px]" />
      </a>
      <button id="openMenu" class="text-4xl text-[var(--neon-blue)]">
        <span class="material-symbols-outlined !text-[2rem]">menu</span>
      </button>
    </div>
    <!-- Neon Divider -->
    <div class="h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
    <!-- HERO -->
    <header class="split">
      <div class="flex items-center justify-center flex-col order-2 lg:order-1">
        <h1 class="font-medium text-center">
          <span data-i18n="404_hero_title"></span>
        </h1>
        <div class="divider-komet section-inner-small-top section-inner-small-bottom"></div>
        <span class="font-medium text-center" data-i18n="404_hero_subtitle"></span>
        <a 
          data-i18n="404_button"
          data-i18n-href="404_link"
          data-i18n-aria="404_aria"
          data-i18n-title="404_title"
          class="primary-cta section-inner-small-top section-inner-small-bottom">
        </a>
      </div>
      <div class="flex items-center justify-center order-1 lg:order-2">
        <img src="/img/portrait_404_virginia_daecher_space_ki_generated.png" data-i18n-alt="hero_404_alt">
      </div>
    </header>
    <div class="w-full h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
  </div>
</section>

</main>

<div class="container-main mb-[2rem]">
  <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent mb-[1rem]"></div>
  <footer class="flex justify-between flex-wrap">
    <p><span class="text-[24px]">©</span> <span data-i18n="copyright"></span></p>
    <!-- Sprachwechsel Buttons -->
    <div class="flex items-center text-[1rem] mt-[1rem] lg:mt-[0rem]">
      <a class="cursor-pointer" data-i18n="btn_lang_de" data-i18n-aria="german_aria" onclick="setLanguage('de'); return false;"></a>
      <div class="w-[24px] divider-komet-small-rotated h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
      <a class="cursor-pointer" data-i18n="btn_lang_en" data-i18n-aria="english_aria" onclick="setLanguage('en'); return false;"></a>
    </div>
  </footer>
</div>
  <!-- JS -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
