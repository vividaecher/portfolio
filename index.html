<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="hero_title">Willkommen auf dem Launchpad von Vivi</title>
</head>
<body class="text-white bg-[var(--space-black)] bg-[url(/img/Sterne.svg)] bg-no-repeat bg-top">
<!-- MOBILE NAV -->
<nav id="mobileNav" class="mobile-nav">
  <div class="container-main h-full flex flex-col section">
    <div class="flex justify-between items-center mb-[1rem]">
      <a href="#" aria-label="Startseite Virginia Dächer" title="Startseite Virginia Dächer">
        <img src="/img/logo_virginia_daecher.svg" alt="mobiles Logo Virginia Dächer" class="h-[32px]">
      </a>
      <button id="closeMenu" class="text-4xl text-white">
        <span class="material-symbols-outlined !text-[2rem]">close</span>
      </button>
    </div>
    <div class="h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
      <ul class="flex flex-col text-xl mt-12">
        <li class="nav-item">
          <a class="mobile-link" aria-label="Startseite von Virginia Dächer" title="Startseite Virginia Dächer">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span data-i18n="nav_launchpad"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="mobile-link" aria-label="Mehr über Virginia Dächer erfahren" title="Über Virginia Dächer">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span data-i18n="nav_crew_profile"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="mobile-link" aria-label="Portfolio von Virginia Dächer führt" title="Portfolio von Virginia Dächer">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span data-i18n="nav_missions"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="mobile-link" aria-label="Impressum & Datenschutz von Virginia Dächer" title="Impressum & Datenschutz Virginia Dächer">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span data-i18n="nav_imprint"></span>
          </a>
        </li>
      </ul>
  </div>
</nav>
<section class="section-inner">
  <div class="container-main">
    <nav class="hidden lg:block" aria-label="Hauptnavigation">
      <div class="px-6">
        <!-- 12-Spalten-Grid: 5 | 2 (Logo) | 5 -->
        <div class="grid grid-cols-12 items-center py-4">
          <div class="col-span-5 flex items-center">
            <a href="#" class="current nav-link shrink-0 text-sm font-medium" aria-label="Startseite Virginia Dächer">
              [<span data-i18n="nav_launchpad"></span>]
            </a>
            <a href="#" class="nav-link mx-auto text-sm font-medium" aria-label="Mehr über Virginia Dächer erfahren" title="Über Virginia Dächer">
              <span data-i18n="nav_crew_profile"></span>
            </a>
          </div>
          <a href="#" class="col-span-2 justify-self-center" aria-label="Startseite Virginia Dächer" title="Startseite Virginia Dächer">
            <img src="/img/logo_virginia_daecher.svg" alt="Logo Virginia Dächer" class="hidden lg:block" />
          </a>
          <div class="col-span-5 flex items-center" aria-label="Portfolio von Virginia Dächer" title="Portfolio Virginia Dächer">
            <a href="#" class="nav-link mx-auto text-sm font-medium">
              <span data-i18n="nav_missions"></span>
            </a>
            <a href="#" class="nav-link shrink-0 text-sm font-medium" aria-label="Impressum & Datenschutz Virginia Dächer" title="Impressum & Datenschutz Virginia Dächer">
              <span data-i18n="nav_imprint"></span>
            </a>
          </div>
        </div>
      </div>
    </nav>
    <!-- Mobile Menu Button -->
    <div class="lg:hidden flex justify-between items-center mb-[1rem]">
       <!-- Logo immer horizontal zentriert -->
      <a href="#" class="justify-self-center" aria-label="Startseite Virginia Dächer" title="Startseite Virginia Dächer">
        <img src="/img/logo_virginia_daecher.svg" alt="Logo Virginia Dächer" class="h-[32px]" />
      </a>
      <button id="openMenu" class="text-4xl text-[var(--neon-blue)]">
        <span class="material-symbols-outlined !text-[2rem]">menu</span>
      </button>
    </div>
    <!-- Neon Divider -->
    <div class="h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
    <!-- HERO -->
    <header class="split section-inner">
      <div class="flex items-center justify-center flex-col order-2 lg:order-1">
        <h1 class="font-medium text-center">
          <span data-i18n="hero_title">Willkommen auf dem Launchpad von</span>
          <span class="uppercase">Vivi</span>
        </h1>
        <div class="divider-komet section-inner-small-top section-inner-small-bottom"></div>
        <span class="font-medium text-center" data-i18n="hero_subtitle">Frontend Software Developer & Pixel-Pilot</span>
        <button class="primary-cta section-inner-small-top section-inner-small-bottom" data-i18n="hero_button">Mehr erfahren</button>
      </div>
      <div class="flex items-center justify-center order-1 lg:order-2">
        <img src="/img/portrait_virginia_daecher_space_ki_generated.png" alt="Portrait von Virginia Dächer in einem Space Suit, KI Generated">
      </div>
    </header>
    <div class="w-full h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
  </div>
</section>
<section class="section">
  <!-- Sprachwechsel Buttons -->
  <div class="flex justify-center gap-4 mt-4">
    <button data-i18n="btn_lang_de" onclick="setLanguage('de')" class="primary-cta"></button>
    <button data-i18n="btn_lang_en" onclick="setLanguage('en')" class="primary-cta"></button>
  </div>
  </section>

  <!-- JS -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
