<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="hero_title">Willkommen auf dem Launchpad von Vivi</title>
</head>
<body class="text-white bg-[var(--space-black)] bg-[url(/img/Sterne.svg)] bg-no-repeat bg-top">
<!-- MOBILE NAV -->
<nav id="mobileNav" class="mobile-nav">
  <div class="container-main h-full flex flex-col section">
    <div class="flex justify-between items-center mb-[1rem]">
      <a href="#" aria-label="Startseite Virginia Dächer" title="Startseite Virginia Dächer">
        <img src="/img/logo_virginia_daecher.svg" alt="mobiles Logo Virginia Dächer" class="h-[32px]">
      </a>
      <button id="closeMenu" class="text-4xl text-white">
        <span class="material-symbols-outlined !text-[2rem]">close</span>
      </button>
    </div>
    <div class="h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
      <ul class="flex flex-col text-xl mt-12">
        <li class="nav-item">
          <a class="mobile-link" aria-label="Startseite von Virginia Dächer" title="Startseite Virginia Dächer">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span data-i18n="nav_launchpad"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="mobile-link" aria-label="Mehr über Virginia Dächer erfahren" title="Über Virginia Dächer">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span data-i18n="nav_crew_profile"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="mobile-link" aria-label="Portfolio von Virginia Dächer führt" title="Portfolio von Virginia Dächer">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span data-i18n="nav_missions"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="mobile-link" aria-label="Impressum & Datenschutz von Virginia Dächer" title="Impressum & Datenschutz Virginia Dächer">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span data-i18n="nav_imprint"></span>
          </a>
        </li>
      </ul>
  </div>
</nav>
<main>
<section class="section-inner">
  <div class="container-main">
    <nav class="hidden lg:block" aria-label="Hauptnavigation">
      <div class="px-6">
        <!-- 12-Spalten-Grid: 5 | 2 (Logo) | 5 -->
        <div class="grid grid-cols-12 items-center py-4">
          <div class="col-span-5 flex items-center">
            <a href="#" class="current nav-link shrink-0 text-sm font-medium" aria-label="Startseite Virginia Dächer">
              [<span data-i18n="nav_launchpad"></span>]
            </a>
            <a href="#" class="nav-link mx-auto text-sm font-medium" aria-label="Mehr über Virginia Dächer erfahren" title="Über Virginia Dächer">
              <span data-i18n="nav_crew_profile"></span>
            </a>
          </div>
          <a href="#" class="col-span-2 justify-self-center" aria-label="Startseite Virginia Dächer" title="Startseite Virginia Dächer">
            <img src="/img/logo_virginia_daecher.svg" alt="Logo Virginia Dächer" class="hidden lg:block" />
          </a>
          <div class="col-span-5 flex items-center" aria-label="Portfolio von Virginia Dächer" title="Portfolio Virginia Dächer">
            <a href="#" class="nav-link mx-auto text-sm font-medium">
              <span data-i18n="nav_missions"></span>
            </a>
            <a href="#" class="nav-link shrink-0 text-sm font-medium" aria-label="Impressum & Datenschutz Virginia Dächer" title="Impressum & Datenschutz Virginia Dächer">
              <span data-i18n="nav_imprint"></span>
            </a>
          </div>
        </div>
      </div>
    </nav>
    <!-- Mobile Menu Button -->
    <div class="lg:hidden flex justify-between items-center mb-[1rem]">
       <!-- Logo immer horizontal zentriert -->
      <a href="#" class="justify-self-center" aria-label="Startseite Virginia Dächer" title="Startseite Virginia Dächer">
        <img src="/img/logo_virginia_daecher.svg" alt="Logo Virginia Dächer" class="h-[32px]" />
      </a>
      <button id="openMenu" class="text-4xl text-[var(--neon-blue)]">
        <span class="material-symbols-outlined !text-[2rem]">menu</span>
      </button>
    </div>
    <!-- Neon Divider -->
    <div class="h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
    <!-- HERO -->
    <header class="split section-inner">
      <div class="flex items-center justify-center flex-col order-2 lg:order-1">
        <h1 class="font-medium text-center">
          <span data-i18n="hero_title"></span>
          <span class="uppercase">Vivi</span>
        </h1>
        <div class="divider-komet section-inner-small-top section-inner-small-bottom"></div>
        <span class="font-medium text-center" data-i18n="hero_subtitle"></span>
        <button class="primary-cta section-inner-small-top section-inner-small-bottom" data-i18n="hero_button"></button>
      </div>
      <div class="flex items-center justify-center order-1 lg:order-2">
        <img src="/img/portrait_virginia_daecher_space_ki_generated.png" alt="Portrait von Virginia Dächer in einem Space Suit, KI Generated">
      </div>
    </header>
    <div class="w-full h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
  </div>
</section>
<div class="container-main">
  <section class="section">
    <div class="flex justify-center items-center">
      <div class="w-[24px] h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
      <h2 data-i18n="section_title_mission_briefing" class="mr-[.5rem] ml-[.5rem] hyphens-auto text-center uppercase"></h2>
      <div class="w-[24px] h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
    </div>
    <div class="split section-inner">
      <div class="order-2 lg:order-1">
        <section class="glowing-box border-2 border-[var(--neon-blue)] rounded-br-3xl rounded-bl-lg rounded-tr-lg rounded-tl-3xl">
          <!-- SKILLS HEADER -->
          <div class="border-b border-[var(--neon-blue)] pr-[1rem] pl-[1rem] pt-[0.5rem] pb-[0.5rem] md:pr-[2rem] md:pl-[2rem] md:pt-[1rem] md:pb-[1rem] glowing-box">
            <h4 class="uppercase tracking-widest text-white font-medium" data-i18n="skills_title"></h4>
          </div>

          <!-- Skills werden hier automatisch eingefügt -->
          <div id="skillsGrid" class="px-[1rem] py-[1rem] md:px-[2rem] md:py-[2rem] grid gap-10 md:grid-cols-2 lg:grid-cols-3"></div>

          <!-- SOFT SKILLS HEADER -->
          <div class="border-y border-[var(--neon-blue)] pr-[1rem] pl-[1rem] pt-[0.5rem] pb-[0.5rem] md:pr-[2rem] md:pl-[2rem] md:pt-[1rem] md:pb-[1rem] glowing-box">
            <h4 class="uppercase tracking-widest text-white font-medium" data-i18n="softskills_title"></h4>
          </div>

          <!-- Soft Skills Container -->
          <div id="softSkills" class="px-[1rem] py-[1rem] md:px-[2rem] md:py-[2rem] grid gap-10 md:grid-cols-3 text-center"></div>
        </section>
      </div>
      <div class="order-1 lg:order-2">
        <h3 data-i18n="section_title_bodytext_mission_briefing"></h3>
      <div class="divider-komet mb-[1rem] text-left"></div>
        <p class="mb-[1rem]" data-i18n="section_bodytext_paragraph_one_mission_briefing"></p>
        <p class="mb-0" data-i18n="section_bodytext_paragraph_two_mission_briefing"></p>
      </div>
    </div>
  </section>
  <div class="w-full h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
</div>


<div class="container-main">
  <section class="section">
    <div class="flex justify-center items-center">
      <div class="w-[24px] h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
      <h2 data-i18n="section_title_mission_log" class="mr-[.5rem] ml-[.5rem] hyphens-auto text-center uppercase"></h2>
      <div class="w-[24px] h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
    </div>
    <div class="split section-inner">
        <section class="glowing-box border-2 border-[var(--neon-blue)] rounded-br-3xl rounded-bl-lg rounded-tr-lg rounded-tl-3xl">
          <!-- HEADER -->
          <div class="border-b border-[var(--neon-blue)] pr-[2rem] pl-[2rem] pt-[1rem] pb-[1rem] glowing-box">
            <h4 class="uppercase tracking-widest text-white font-medium" data-i18n="experience_title"></h4>
          </div>
          <!-- TIMELINE -->
          <div class="px-[2rem] py-[2rem]">
            <div class="flex">
              <!-- Datum -->
              <div class="grid gap-[0.5rem] md:gap-[1rem] items-start w-full">
                <div class="text-white tracking-wider small uppercase font-bold" data-i18n="exp_1_date"></div>
                <div class="text-white tracking-wider small uppercase font-bold" data-i18n="exp_2_date"></div>
              </div>
              <!-- vertikale Orbit-Linie -->
              <div class="hidden md:block divider-komet divider-komet-small-rotated-revert !w-[180px]"></div>
            
              <!-- Job -->
              <div class="grid gap-[0.5rem] md:gap-[1rem] items-start w-full">
                <div>
                  <span class="text-white tracking-wider small uppercase font-bold" data-i18n="exp_1_company"></span>
                  <p class="mt-[0.25rem] md:mt-[0.5rem] text-[0.875rem] font-normal" data-i18n="exp_1_role"></p>
                </div>
                <div>
                  <span class="text-white tracking-wider small uppercase font-bold" data-i18n="exp_2_company"></span>
                  <p class="mt-[0.25rem] md:mt-[0.5rem] text-[0.875rem] font-normal" data-i18n="exp_2_role"></p>
                </div>
              </div>
            </div>
          </div>
        </section>
    </div>
  </section>
  <div class="w-full h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
</div>

</main>

<div class="container-main mb-[2rem]">
  <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent mb-[1rem]"></div>
  <footer class="flex justify-between flex-wrap">
    <p><span class="text-[24px]">©</span> 2026 Virginia Dächer - Made with curiosity, clean code & a love for good interfaces.</p>
    <!-- Sprachwechsel Buttons -->
    <div class="flex items-center">
      <a href="#" data-i18n="btn_lang_de" onclick="setLanguage('de'); return false;"></a>
      <div class="w-[24px] divider-komet-small-rotated h-[2px] bg-gradient-to-r from-transparent via-[var(--neon-blue)] to-transparent"></div>
      <a href="#" data-i18n="btn_lang_en" onclick="setLanguage('en'); return false;"></a>
    </div>
  </footer>
</div>
  <!-- JS -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
